<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/08.07.26/diary/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="diary_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>diary_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    html, body { background: #0D0520; margin: 0; height: 100%; }
    #boot-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: #9E8FBF; font: 15px/1.5 -apple-system, sans-serif; text-align: center;
      padding: 0 24px;
    }
    #boot-spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(212,168,67,.25); border-top-color: #D4A843;
      animation: boot-spin 1s linear infinite;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
    #boot-error { color: #E08A8A; font-size: 13px; word-break: break-word; display: none; }
  </style>
  <div id="boot-loader">
    <div id="boot-spinner"></div>
    <div>Загрузка дневника…<br><small>при первом открытии может занять до минуты</small></div>
    <div id="boot-error"></div>
  </div>
  <script>
    // Убрать заставку, когда Flutter отрисовал первый кадр
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('boot-loader');
      if (el) el.remove();
    });
    // Показать ошибку запуска вместо пустого экрана
    function bootShowError(msg) {
      var el = document.getElementById('boot-error');
      var sp = document.getElementById('boot-spinner');
      if (sp) sp.style.display = 'none';
      if (el) { el.style.display = 'block'; el.textContent = 'Ошибка запуска: ' + msg; }
    }
    // capture-фаза ловит и ошибки загрузки ресурсов (у них нет всплытия)
    window.addEventListener('error', function (e) {
      if (e.target && e.target !== window && (e.target.src || e.target.href)) {
        bootShowError('не загрузился файл ' + (e.target.src || e.target.href));
      } else {
        bootShowError(e.message || String(e.error || e));
      }
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      bootShowError(String(e.reason || 'unknown'));
    });
    // Сторожевой таймер: если приложение не стартовало за 45 секунд
    var bootStarted = false;
    window.addEventListener('flutter-first-frame', function () { bootStarted = true; });
    setTimeout(function () {
      if (bootStarted || !document.getElementById('boot-loader')) return;
      var el = document.getElementById('boot-error');
      if (el && el.style.display !== 'block') {
        el.style.display = 'block';
        el.textContent = 'Приложение долго не запускается. Попробуйте: 1) открыть эту ссылку ' +
          'в приватной вкладке Safari; 2) проверить, что установлена iOS 15 или новее.';
      }
    }, 45000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
